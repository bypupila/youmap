version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    groups:
      next-runtime:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "eslint-config-next"
      security-tooling:
        patterns:
          - "@types/*"
          - "eslint*"
          - "typescript"
    labels:
      - "dependencies"
      - "security"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "security"
